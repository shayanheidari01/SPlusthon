title: SPlusthon
description: مستندات کتابخانه UserBot برای سروش‌پلاس
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - node_modules/
  - vendor/

defaults:
  - scope:
      path: ""
    values:
      layout: default

# RTL support for Persian
rtl: true

# Navigation
header:
  - title: خانه
    url: /
  - title: شروع سریع
    url: /quick-start/
  - title: نصب و راه‌اندازی
    url: /installation/
  - title: مفاهیم پایه
    url: /concepts/
  - title: مثال‌ها
    url: /examples/
  - title: مرجع API
    url: /api-reference/
  - title: سوالات متداول
    url: /faq/
